name: Build Desktop Installers

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare external libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev
          mkdir -p external
          if [ -f /usr/lib/x86_64-linux-gnu/libmpv.so ]; then
            cp /usr/lib/x86_64-linux-gnu/libmpv.so external/
          fi
          # Fallback for versioned names
          find /usr/lib/x86_64-linux-gnu -name "libmpv.so*" -exec cp {} external/libmpv.so \;

      - name: Prepare external libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mpv
          mkdir -p external
          if [ -f /opt/homebrew/lib/libmpv.dylib ]; then
            cp /opt/homebrew/lib/libmpv.dylib external/
          elif [ -f /usr/local/lib/libmpv.dylib ]; then
            cp /usr/local/lib/libmpv.dylib external/
          fi

      - name: Prepare external libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path external
          # Fetch the latest release URL dynamically from shinchiro's repo
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*" } | Select-Object -First 1
          if ($null -eq $asset) { throw "Could not find mpv-dev asset" }
          $url = $asset.browser_download_url
          Write-Host "Downloading from $url"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          7z.exe e mpv-dev.7z -oexternal *.dll -r

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build and package desktop app
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: |
            desktopApp/build/compose/binaries/main/msi/*.msi
            desktopApp/build/compose/binaries/main/dmg/*.dmg
            desktopApp/build/compose/binaries/main/deb/*.deb
