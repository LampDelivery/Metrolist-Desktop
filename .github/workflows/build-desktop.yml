name: Build Desktop Installers

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare external libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            libfuse2 \
            rpm \
            zstd
          # Load FUSE kernel module — required by appimagetool for AppImage packaging
          sudo modprobe fuse || true
          mkdir -p external
          find /usr/lib/x86_64-linux-gnu -name "libmpv.so*" -exec cp {} external/libmpv.so \; || true

      - name: Prepare external libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mpv
          mkdir -p external
          if [ -f /opt/homebrew/lib/libmpv.dylib ]; then
            cp /opt/homebrew/lib/libmpv.dylib external/
          elif [ -f /usr/local/lib/libmpv.dylib ]; then
            cp /usr/local/lib/libmpv.dylib external/
          fi

      - name: Prepare external libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path external
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*" } | Select-Object -First 1
          if ($null -eq $asset) { throw "Could not find mpv-dev asset" }
          $url = $asset.browser_download_url
          Write-Host "Downloading from $url"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          7z.exe e mpv-dev.7z -oexternal *.dll -r

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Generate installer icons
        shell: bash
        run: |
          python3 -m pip install --quiet Pillow --break-system-packages
          # cairosvg gives higher-quality SVG rendering; optional — script falls back to logo.png
          python3 -m pip install --quiet cairosvg --break-system-packages 2>/dev/null || true
          python3 scripts/gen_icons.py

      - name: Build and package desktop app
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            # APPIMAGE_EXTRACT_AND_RUN=1 lets appimagetool (itself an AppImage) run
            # without FUSE by extracting to a temp dir instead of mounting.
            export APPIMAGE_EXTRACT_AND_RUN=1
            # Build all three Linux formats in one Gradle invocation
            ./gradlew :desktopApp:packageDeb :desktopApp:packageRpm :desktopApp:packageAppImage
          else
            ./gradlew :desktopApp:packageDistributionForCurrentOS
          fi

      # ── Artifact upload (split by OS for clean download names) ────────────────

      - name: Create Arch Linux package (.pkg.tar.zst)
        if: runner.os == 'Linux'
        run: |
          DEB=$(ls desktopApp/build/compose/binaries/main/deb/*.deb | head -1)
          NAME=$(dpkg-deb -f "$DEB" Package | tr '[:upper:]' '[:lower:]')
          VERSION=$(dpkg-deb -f "$DEB" Version)
          PKGVER="${VERSION}-1"

          mkdir -p arch_staging
          dpkg-deb -x "$DEB" arch_staging/

          SIZE=$(du -sb arch_staging | awk '{print $1}')
          {
            echo "pkgname = ${NAME}"
            echo "pkgver = ${PKGVER}"
            echo "pkgdesc = Metrolist Music Player"
            echo "arch = x86_64"
            echo "builddate = $(date +%s)"
            echo "size = ${SIZE}"
          } > arch_staging/.PKGINFO

          mkdir -p arch_out
          tar -c -C arch_staging . | zstd -9 -o "arch_out/${NAME}-${PKGVER}-x86_64.pkg.tar.zst"

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Windows
          path: desktopApp/build/compose/binaries/main/msi/*.msi

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-macOS
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg

      - name: Upload artifacts (Linux .deb — Debian / Ubuntu / Mint)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

      - name: Upload artifacts (Linux .rpm — Fedora / RHEL / openSUSE)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Linux-rpm
          path: desktopApp/build/compose/binaries/main/rpm/*.rpm

      - name: Upload artifacts (Linux .AppImage — NixOS / generic)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Linux-AppImage
          path: desktopApp/build/compose/binaries/main/app-image/**

      - name: Upload artifacts (Linux .pkg.tar.zst — Arch / Manjaro)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Linux-pkg-tar-zst
          path: arch_out/*.pkg.tar.zst
